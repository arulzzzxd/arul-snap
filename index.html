<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arulz Music</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header class="header">

<div class="profile">

<div class="avatar">
<i class="fas fa-user"></i>
</div>

<h1>S-Music</h1>

</div>

<button id="searchBtn">
<i class="fas fa-search"></i>
</button>

</header>

<div class="search-modal" id="searchModal">

<div class="search-box">

<input
type="text"
id="query"
placeholder="Cari lagu..."
onkeypress="if(event.key==='Enter') searchMusic()">

<button onclick="searchMusic()">
Cari
</button>

</div>

<div id="searchResults" class="search-results"></div>

</div>

<div class="categories">

<button class="active">Semua</button>
<button>Pop</button>
<button>Viral</button>
<button>Galau</button>
<button>Indie</button>
<button>K-Pop</button>
<button>Dangdut</button>

</div>

<section>

<h2>Terakhir Diputar</h2>

<div id="recentList" class="vertical-list"></div>

</section>

<section>

<h2>Top Hits Indonesia</h2>

<div id="topHits" class="music-grid"></div>

</section>

<section>

<h2>Viral Sekarang</h2>

<div id="viralHits" class="music-grid"></div>

</section>

<section>

<h2>Rilis Terbaru</h2>

<div id="newRelease" class="music-grid"></div>

</section>

<div class="player">

<img
id="playerThumb"
src="https://via.placeholder.com/150">

<div class="player-info">

<h4 id="playerTitle">
Belum ada lagu
</h4>

<p id="playerArtist">
-
</p>

</div>

<div class="player-actions">

<button id="playBtn">
<i class="fas fa-play"></i>
</button>

<a
id="downloadBtn"
target="_blank">

<button>
<i class="fas fa-download"></i>
</button>

</a>

</div>

<audio id="audioPlayer"></audio>

</div>

<nav class="bottom-nav">

<button>
<i class="fas fa-home"></i>
<span>Home</span>
</button>

<button id="openSearch">
<i class="fas fa-search"></i>
<span>Cari</span>
</button>

<button>
<i class="fas fa-heart"></i>
<span>Favorit</span>
</button>

<button>
<i class="fas fa-code"></i>
<span>Dev</span>
</button>

</nav>

<script src="script.js"></script>

</body>
</html>
