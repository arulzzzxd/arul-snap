<body>

<header class="topbar">

<div class="profile">

<div class="avatar">
A

<div>

</div>

</header>

<section class="banner">

<div class="banner-content">
<h2>Top Hits Indonesia</h2>

</div>

</section>

<section>

<h2 class="section-title">
Terakhir Diputar

<div id="recentSongs" class="vertical-list">

<div class="loading">
Memuat lagu...

</div>

</section>

<section>

Top Hits Indonesia
</h2>

<div id="topHits" class="music-grid">

<div class="loading">
Memuat lagu...

</div>

</section>

<section>

<h2 class="section-title">
Viral TikTok
</h2>

<div id="viralHits" class="music-grid">

<div class="loading">
Memuat lagu...
</div>

</div>

</section>

<section>

<h2 class="section-title">
Musik Terbaru
</h2>

<div id="newRelease" class="music-grid">

<div class="loading">
Memuat lagu...
</div>

</div>

</section>

<div class="player">

<img
id="playerThumb"
src="https://via.placeholder.com/100">

<div class="player-info">

<h4 id="playerTitle">
Belum ada lagu
</h4>

<p id="playerArtist">
-
</p>

</div>

<div class="player-controls">

<button id="playBtn">
<i class="fas fa-play"></i>
</button>

<a
id="downloadBtn"
target="_blank">

<button>
<i class="fas fa-download"></i>
</button>

</a>

</div>

<audio id="audioPlayer"></audio>

</div>

<nav class="bottom-nav">
