<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arulz Music</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#121212;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:250px;
background:#000;
padding:20px;
}

.logo{
font-size:24px;
font-weight:700;
color:#1DB954;
margin-bottom:30px;
}

.menu{
display:flex;
flex-direction:column;
gap:15px;
}

.menu a{
color:#b3b3b3;
text-decoration:none;
font-weight:500;
}

.menu a:hover{
color:white;
}

.main{
flex:1;
padding:20px;
overflow-y:auto;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search-box input{
flex:1;
padding:12px;
border:none;
border-radius:50px;
background:#242424;
color:white;
}

.search-box button{
padding:12px 20px;
border:none;
border-radius:50px;
background:#1DB954;
font-weight:bold;
cursor:pointer;
}

.results{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:#181818;
padding:15px;
border-radius:12px;
transition:.3s;
cursor:pointer;
}

.card:hover{
background:#282828;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin-top:10px;
font-size:15px;
}

.card p{
font-size:12px;
color:#aaa;
margin-top:5px;
}

.player{
position:fixed;
bottom:0;
left:250px;
right:0;
background:#181818;
padding:15px;
display:flex;
align-items:center;
gap:15px;
border-top:1px solid #333;
}

.player img{
width:60px;
height:60px;
border-radius:8px;
object-fit:cover;
}

.info{
flex:1;
}

.info h4{
font-size:14px;
}

.info p{
font-size:12px;
color:#aaa;
}

.controls button{
background:#1DB954;
border:none;
padding:10px 20px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
}

.download{
background:#fff !important;
margin-left:10px;
}

audio{
display:none;
}

.loading{
text-align:center;
padding:30px;
}
</style>
</head>
<body>

<div class="sidebar">
<div class="logo">🎵 Arulz Music</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Search</a>
<a href="#">Library</a>
</div>
</div>

<div class="main">

<div class="search-box">
<input type="text" id="query" placeholder="Cari lagu...">
<button onclick="searchMusic()">Cari</button>
</div>

<div class="results" id="results"></div>

</div>

<div class="player">

<img id="playerThumb" src="https://via.placeholder.com/60">

<div class="info">
<h4 id="playerTitle">Belum ada lagu</h4>
<p id="playerArtist">-</p>
</div>

<div class="controls">
<button id="playBtn">Play</button>
<a id="downloadBtn" target="_blank">
<button class="download">Download</button>
</a>
</div>

<audio id="audioPlayer"></audio>

</div>

<script>

const results = document.getElementById("results");
const audio = document.getElementById("audioPlayer");

async function searchMusic(){

const query = document.getElementById("query").value.trim();

if(!query) return;

results.innerHTML =
'<div class="loading">Mencari lagu...</div>';

try{

const res = await fetch(
`https://simple-api-lagi.vercel.app/api/search/ytsearch?query=${encodeURIComponent(query)}`
);

const data = await res.json();

let videos =
data.result ||
data.results ||
data.data ||
[];

results.innerHTML = "";

videos.forEach(video=>{

const thumb =
video.thumbnail ||
video.image ||
 video.thumb ||
"https://via.placeholder.com/300";

const title =
video.title || "Tanpa Judul";

const channel =
video.author?.name ||
video.channel ||
"Unknown";

const url =
video.url ||
video.link;

results.innerHTML += `
<div class="card"
onclick="playMusic(
'${encodeURIComponent(url)}',
'${thumb}',
'${title.replace(/'/g,"")}',
'${channel.replace(/'/g,"")}'
)">
<img src="${thumb}">
<h3>${title}</h3>
<p>${channel}</p>
</div>
`;

});

}catch(err){
results.innerHTML =
"<h3>Gagal mengambil data</h3>";
console.error(err);
}

}

async function playMusic(url,thumb,title,artist){

document.getElementById("playerThumb").src = thumb;
document.getElementById("playerTitle").innerText = title;
document.getElementById("playerArtist").innerText = artist;

try{

const res = await fetch(
`https://simple-api-lagi.vercel.app/api/download/ytmp3?url=${decodeURIComponent(url)}`
);

const data = await res.json();

const mp3 =
data.result?.download ||
data.result?.url ||
data.download ||
data.url;

audio.src = mp3;

document.getElementById("downloadBtn").href = mp3;

audio.play();

document.getElementById("playBtn").innerText = "Pause";

}catch(err){
console.error(err);
alert("Gagal memutar lagu");
}

}

document.getElementById("playBtn")
.addEventListener("click",()=>{

if(audio.paused){
audio.play();
document.getElementById("playBtn").innerText="Pause";
}else{
audio.pause();
document.getElementById("playBtn").innerText="Play";
}

});
</script>

</body>
</html>
