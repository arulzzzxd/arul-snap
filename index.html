<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player & Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 40px;
            margin-bottom: 120px; /* Jarak agar tidak tertutup player di bawah */
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Search Box */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .search-box button {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(to right, #38bdf8, #6366f1);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .search-box button:hover {
            opacity: 0.9;
        }

        /* Status & Loading */
        .status {
            text-align: center;
            color: #94a3b8;
            margin-top: 10px;
        }

        /* Results List */
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .track-card {
            display: flex;
            align-items: center;
            background-color: #1e293b;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .track-card:hover {
            transform: translateY(-2px);
            background-color: #273549;
        }

        .track-thumb {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 15px;
        }

        .track-info {
            flex: 1;
            overflow: hidden;
        }

        .track-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .track-author {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Bottom Sticky Player */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #0f172a;
            border-top: 1px solid #334155;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            display: none; /* Sembunyikan jika belum ada lagu diputar */
        }

        .player-info {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }

        .player-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            padding-right: 20px;
        }

        .player-controls {
            width: 100%;
            max-width: 600px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        audio {
            flex: 1;
            height: 35px;
        }

        .download-btn {
            background-color: #22c55e;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .download-btn:hover {
            background-color: #16a34a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><i class="fa-solid fa-music"></i> PyMusic</h1>
        
        <div class="search-box">
            <input type="text" id="query" placeholder="Cari lagu atau artis...">
            <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> Cari</button>
        </div>

        <div id="status" class="status"></div>

        <div id="resultsList" class="results-list"></div>
    </div>

    <div id="playerBar" class="player-bar">
        <div class="player-info">
            <div id="playerTitle" class="player-title">Memuat lagu...</div>
        </div>
        <div class="player-controls">
            <audio id="audioPlayer" controls autoplay></audio>
            <button id="downloadBtn" class="download-btn" title="Download MP3">
                <i class="fa-solid fa-download"></i>
            </button>
        </div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const queryInput = document.getElementById('query');
        const statusDiv = document.getElementById('status');
        const resultsList = document.getElementById('resultsList');
        const playerBar = document.getElementById('playerBar');
        const audioPlayer = document.getElementById('audioPlayer');
        const playerTitle = document.getElementById('playerTitle');
        const downloadBtn = document.getElementById('downloadBtn');

        let currentDownloadUrl = "";

        // Trigger pencarian saat tombol diklik
        searchBtn.addEventListener('click', searchMusic);

        // Trigger pencarian saat menekan tombol 'Enter' di keyboard
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchMusic();
        });

        // Fungsi Utama untuk Mencari Lagu
        async function searchMusic() {
    const query = queryInput.value.trim();
    if (!query) return;

    statusDiv.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Mencari lagu...';
    resultsList.innerHTML = '';

    try {
        // Menambahkan mode cors secara eksplisit
        const response = await fetch(`https://simple-api-lagi.vercel.app/api/search/ytsearch?query=${encodeURIComponent(query)}`, {
            method: 'GET',
            headers: { 'Accept': 'application/json' }
        });

        if (!response.ok) {
            throw new Error(`Server merespons dengan status: ${response.status}`);
        }

        const data = await response.json();
        console.log("Raw API Response:", data); // Intip struktur asli di Inspect Element -> Console

        // Ambil array hasil video dari berbagai kemungkinan properti response API
        let tracks = [];
        if (Array.isArray(data)) {
            tracks = data;
        } else if (data.result && Array.isArray(data.result)) {
            tracks = data.result;
        } else if (data.data && Array.isArray(data.data)) {
            tracks = data.data;
        }

        if (tracks.length === 0) {
            statusDiv.innerText = "Lagu tidak ditemukan atau format API berubah.";
            return;
        }

        statusDiv.innerText = ""; // Hapus status loading

        // Tampilkan hasil pencarian
        tracks.forEach(track => {
            // Abaikan jika objek tidak memiliki URL/Link video
            const videoUrl = track.url || track.link || track.videoId;
            if (!videoUrl) return;

            const card = document.createElement('div');
            card.className = 'track-card';
            card.innerHTML = `
                <img class="track-thumb" src="${track.thumbnail || track.image || 'https://via.placeholder.com/150'}" alt="thumb">
                <div class="track-info">
                    <div class="track-title">${track.title || 'Tanpa Judul'}</div>
                    <div class="track-author">${track.author?.name || track.publisher || track.description || 'Unknown Artist'}</div>
                </div>
            `;
            
            // Masukkan URL asli yang ditemukan ke fungsi playTrack
            const finalUrl = videoUrl.includes('http') ? videoUrl : `https://www.youtube.com/watch?v=${videoUrl}`;
            
            card.addEventListener('click', () => playTrack(finalUrl, track.title));
            resultsList.appendChild(card);
        });

    } catch (error) {
        console.error(error);
        // Menampilkan pesan eror yang lebih detail agar mudah di-debug
        statusDiv.innerHTML = `<span style="color: #ef4444;">Gagal mengambil data: ${error.message}.</span><br><small>Cek console log browser untuk detailnya.</small>`;
    }
}

        // Fungsi Mendapatkan Link Audio dan Memutarnya
        async function playTrack(youtubeUrl, title) {
            statusDiv.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Menyiapkan audio untuk: <b>${title}</b>...`;
            
            // Tampilkan player bar dengan teks "Memuat" terlebih dahulu
            playerBar.style.display = 'flex';
            playerTitle.innerText = `Memuat: ${title}`;
            audioPlayer.src = ""; 

            try {
                const response = await fetch(`https://simple-api-lagi.vercel.app/api/download/ytmp3?url=${encodeURIComponent(youtubeUrl)}`);
                const data = await response.json();

                // Deteksi letak url audio dari respons API downloader Anda
                const audioUrl = data.result?.url || data.result?.download || data.url;

                if (!audioUrl) {
                    statusDiv.innerText = "Gagal mendapatkan link audio.";
                    playerTitle.innerText = "Gagal memuat lagu.";
                    return;
                }

                statusDiv.innerText = ""; // Reset status atas

                // Mainkan di Audio Player
                playerTitle.innerText = title;
                audioPlayer.src = audioUrl;
                audioPlayer.load();
                audioPlayer.play();

                // Simpan URL untuk keperluan tombol download
                currentDownloadUrl = audioUrl;

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Gagal memuat player audio.";
                playerTitle.innerText = "Terjadi kesalahan.";
            }
        }

        // Fungsi Tombol Unduh
        downloadBtn.addEventListener('click', () => {
            if (currentDownloadUrl) {
                window.open(currentDownloadUrl, '_blank');
            } else {
                alert("Belum ada lagu yang siap diunduh.");
            }
        });
    </script>
</body>
      </html>
