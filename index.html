<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arulz Music</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<!-- HEADER -->
<header class="topbar">
    <h1>🎵 Arulz Music</h1>

    <a href="search.html" class="search-btn">
        <i class="fas fa-search"></i>
    </a>
</header>

<!-- CONTENT -->
<main class="container">

    <!-- TOP HITS -->
    <section>
        <h2>Top Hits Indonesia</h2>
        <div id="topHits" class="card-grid">
            <div class="loading">
                Memuat lagu...
            </div>
        </div>
    </section>

    <!-- VIRAL -->
    <section>
        <h2>Lagu Viral</h2>
        <div id="viralHits" class="card-grid">
            <div class="loading">
                Memuat lagu...
            </div>
        </div>
    </section>

    <!-- TERBARU -->
    <section>
        <h2>Musik Terbaru</h2>
        <div id="newRelease" class="card-grid">
            <div class="loading">
                Memuat lagu...
            </div>
        </div>
    </section>

    <!-- TERAKHIR DIPUTAR -->
    <section>
        <h2>Terakhir Diputar</h2>
        <div id="recentSongs" class="song-list">
            <div class="loading">
                Belum ada lagu diputar
            </div>
        </div>
    </section>

</main>

<!-- MINI PLAYER -->
<div class="player">

    <img
    id="playerThumb"
    src="https://placehold.co/80x80"
    alt="thumbnail">

    <div class="player-info">
        <h4 id="playerTitle">
            Pilih Lagu
        </h4>

        <p id="playerArtist">
            Artist
        </p>
    </div>

    <button id="playBtn">
        <i class="fas fa-play"></i>
    </button>

</div>

<!-- FULL PLAYER -->
<div id="fullPlayer" class="full-player">

    <div class="full-header">

        <button onclick="closePlayer()">
            <i class="fas fa-chevron-down"></i>
        </button>

        <span>Sekarang Diputar</span>

        <div></div>

    </div>

    <div class="full-content">

        <img
        id="fpThumb"
        src="https://placehold.co/400x400"
        alt="cover">

        <h2 id="fpTitle">
            Judul Lagu
        </h2>

        <p id="fpArtist">
            Nama Artist
        </p>

        <div class="progress-container">

            <div class="progress-bg">

                <div
                id="progress"
                class="progress">
                </div>

            </div>

        </div>

        <div class="controls">

            <button id="prevBtn">
                <i class="fas fa-backward"></i>
            </button>

            <button id="bigPlay">
                <i class="fas fa-play"></i>
            </button>

            <button id="nextBtn">
                <i class="fas fa-forward"></i>
            </button>

        </div>

        <button
        id="downloadBtn"
        class="download-btn">

            <i class="fas fa-download"></i>
            Download MP3

        </button>

    </div>

</div>

<!-- AUDIO -->
<audio id="audioPlayer"></audio>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">

    <a href="index.html" class="active">
        <i class="fas fa-home"></i>
        <span>Home</span>
    </a>

    <a href="search.html">
        <i class="fas fa-search"></i>
        <span>Cari</span>
    </a>

</nav>

<script src="script.js"></script>

</body>
</html>
