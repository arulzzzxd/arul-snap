<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arulz Music</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#121212;
color:#fff;
}

.sidebar{
position:fixed;
left:0;
top:0;
bottom:0;
width:80px;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
padding:20px 10px;
z-index:100;
}

.logo{
font-size:14px;
font-weight:700;
color:#1DB954;
text-align:center;
margin-bottom:30px;
}

.menu{
width:100%;
}

.menu a{
display:block;
text-decoration:none;
color:#b3b3b3;
padding:12px 0;
text-align:center;
font-size:13px;
}

.menu a:hover{
color:#fff;
}

.main{
margin-left:80px;
padding:15px;
padding-bottom:130px;
}

.search-box{
display:flex;
gap:10px;
}

.search-box input{
flex:1;
height:50px;
border:none;
outline:none;
border-radius:25px;
background:#242424;
padding:0 20px;
color:#fff;
font-size:15px;
}

.search-box button{
width:90px;
border:none;
border-radius:25px;
background:#1DB954;
color:white;
font-weight:600;
cursor:pointer;
}

.results{
margin-top:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
}

.card{
background:#181818;
padding:10px;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.card:hover{
background:#282828;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
}

.card h3{
font-size:13px;
margin-top:8px;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.card p{
font-size:11px;
color:#aaa;
margin-top:5px;
}

.loading{
text-align:center;
padding:30px;
}

.player{
position:fixed;
left:80px;
right:0;
bottom:0;
background:#181818;
border-top:1px solid #333;
padding:10px;
display:flex;
align-items:center;
gap:10px;
z-index:1000;
}

.player img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
}

.info{
flex:1;
overflow:hidden;
}

.info h4{
font-size:14px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.info p{
font-size:12px;
color:#aaa;
}

.controls{
display:flex;
gap:10px;
}

.controls button{
border:none;
padding:10px 15px;
border-radius:30px;
cursor:pointer;
font-weight:600;
}

.play-btn{
background:#1DB954;
}

.download-btn{
background:#fff;
}

audio{
display:none;
}

@media(max-width:600px){

.results{
grid-template-columns:repeat(2,1fr);
}

.card img{
height:120px;
}

}
</style>
</head>
<body>

<div class="sidebar">
<div class="logo">🎵<br>Arulz</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Search</a>
<a href="#">Library</a>
</div>
</div>

<div class="main">

<div class="search-box">
<input
id="query"
type="text"
placeholder="Cari lagu..."
onkeypress="if(event.key==='Enter') searchMusic()">
<button onclick="searchMusic()">Cari</button>
</div>

<div id="results" class="results"></div>

</div>

<div class="player">

<img
id="playerThumb"
src="https://via.placeholder.com/150">

<div class="info">
<h4 id="playerTitle">Belum ada lagu</h4>
<p id="playerArtist">-</p>
</div>

<div class="controls">
<button
class="play-btn"
id="playBtn">
Play
</button>

<a
id="downloadBtn"
target="_blank">

<button class="download-btn">
Download
</button>

</a>
</div>

<audio id="audioPlayer"></audio>

</div>

<script>

const results=document.getElementById("results");
const audio=document.getElementById("audioPlayer");

async function searchMusic(){

const query=document.getElementById("query").value.trim();

if(!query) return;

results.innerHTML=
'<div class="loading">🔍 Mencari lagu...</div>';

try{

const res=await fetch(
`https://simple-api-lagi.vercel.app/api/search/ytsearch?query=${encodeURIComponent(query)}`
);

const json=await res.json();

console.log(json);

const data=
json.result ||
json.results ||
json.data ||
[];

results.innerHTML="";

if(data.length===0){
results.innerHTML=
"<h3>Tidak ada hasil ditemukan</h3>";
return;
}

data.forEach(item=>{

const title=item.title || "Unknown";
const thumb=item.thumbnail || item.image || "";
const channel=
item.author?.name ||
item.channel ||
"Unknown";

const url=
item.url ||
item.link ||
item.videoUrl ||
"";

results.innerHTML += `
<div class="card"
onclick="playMusic(
'${encodeURIComponent(url)}',
'${thumb}',
'${title.replace(/'/g,'')}',
'${channel.replace(/'/g,'')}'
)">
<img src="${thumb}">
<h3>${title}</h3>
<p>${channel}</p>
</div>
`;

});

}catch(err){

console.error(err);

results.innerHTML=
"<h3>❌ Gagal mengambil data</h3>";

}

}

async function playMusic(
url,
thumb,
title,
artist
){

document.getElementById("playerThumb").src=thumb;
document.getElementById("playerTitle").innerText=title;
document.getElementById("playerArtist").innerText=artist;

try{

const res=await fetch(
`https://simple-api-lagi.vercel.app/api/download/ytmp3?url=${decodeURIComponent(url)}`
);

const json=await res.json();

console.log(json);

const mp3=
json.result?.download ||
json.result?.url ||
json.download ||
json.url ||
json.result?.audio;

if(!mp3){
alert("Link MP3 tidak ditemukan");
return;
}

audio.src=mp3;

document.getElementById("downloadBtn").href=mp3;

audio.play();

document.getElementById("playBtn").innerText="Pause";

}catch(err){

console.error(err);

alert("Gagal memutar lagu");

}

}

document
.getElementById("playBtn")
.addEventListener("click",()=>{

if(!audio.src) return;

if(audio.paused){

audio.play();
playBtn.innerText="Pause";

}else{

audio.pause();
playBtn.innerText="Play";

}

});

audio.addEventListener("ended",()=>{
playBtn.innerText="Play";
});

</script>

</body>
</html>
