<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cari Musik - Arulz Music</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
.search-page{
    padding:20px;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.search-box input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#1d1d1d;
    color:white;
}

.search-box button{
    border:none;
    padding:14px 20px;
    border-radius:10px;
    background:#1db954;
    color:white;
}

.result-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
}
</style>

</head>
<body>

<header class="topbar">
    <h1>Cari Musik</h1>

    <a href="index.html" class="search-btn">
        <i class="fas fa-home"></i>
    </a>
</header>

<div class="search-page">

    <div class="search-box">

        <input
        type="text"
        id="searchInput"
        placeholder="Cari lagu...">

        <button id="searchBtn">
            Cari
        </button>

    </div>

    <div
    id="searchResults"
    class="result-grid">

    </div>

</div>

<script src="search.js"></script>

</body>
</html>
